<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DONGUS Airlines</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
    cursor: default;
  }
  #shaker {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
  }
  #hero {
    width: 96px;
    cursor: pointer;
    transition: transform 0.1s;
    user-select: none;
    -webkit-user-select: none;
  }
  #hero:hover {
    transform: scale(1.1);
  }
  #hero:active {
    transform: scale(0.95);
  }
  .spawned {
    position: absolute;
    image-rendering: pixelated;
    left: 0;
    top: 0;
  }
  #nice {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-family: Impact, sans-serif;
    font-size: 20vw;
    color: #fff;
    pointer-events: none;
    z-index: 999;
    text-shadow: 0 0 40px #ff0, 0 0 80px #f0f;
    opacity: 0;
  }
  #clickCount {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-family: monospace;
    color: #333;
    font-size: 14px;
    user-select: none;
    transition: color 0.3s;
    z-index: 20;
  }
</style>
</head>
<body>
<div id="shaker">
  <img id="hero" src="EGGPLANE_WHITE.png" alt="Eggplane">
</div>
<div id="particles"></div>
<div id="nice">NICE!</div>
<div id="clickCount"></div>
<script>
const hero = document.getElementById('hero');
const particles = document.getElementById('particles');
const shaker = document.getElementById('shaker');
const counter = document.getElementById('clickCount');
let clicks = 0;

const titles = [
  'dongus','DONGUS','D O N G U S','dongus rising','dongus ascending',
  'peak dongus','dongus singularity','dongus transcendence','MAXIMUM DONGUS',
  'dongus beyond comprehension'
];

const MAX_PARTICLES = 150;
const particles_arr = [];
let particleCount = 0;
let animating = false;
const preloadedImg = new Image();
preloadedImg.src = 'EGGPLANE_WHITE.png';
preloadedImg.decode().catch(() => {});

let shakeIntensity = 0;
let shakeEnd = 0;

function animationLoop() {
  const now = Date.now();

  // Update particles — swap-and-pop removal
  let i = 0;
  while (i < particleCount) {
    const p = particles_arr[i];
    p.frame++;
    if (p.frame >= p.life) {
      p.img.remove();
      particleCount--;
      particles_arr[i] = particles_arr[particleCount];
      particles_arr[particleCount] = null;
      continue;
    }
    const progress = p.frame / p.life;
    const px = p.x + p.vx * p.frame;
    const py = p.y + p.vy * p.frame + 0.03 * p.frame * p.frame;
    p.img.style.transform = 'translate(' + px + 'px,' + py + 'px) rotate(' + (p.spin * p.frame) + 'deg)';
    if (progress >= 0.6) {
      p.img.style.opacity = Math.max(0, 1 - (progress - 0.6) * 2.5);
    }
    i++;
  }

  // Update shake
  if (now < shakeEnd) {
    const x = (Math.random() - 0.5) * shakeIntensity;
    const y = (Math.random() - 0.5) * shakeIntensity;
    shaker.style.transform = 'translate(' + x + 'px,' + y + 'px)';
  } else if (shaker.style.transform) {
    shaker.style.transform = '';
  }

  if (particleCount > 0 || now < shakeEnd) {
    requestAnimationFrame(animationLoop);
  } else {
    animating = false;
  }
}

function ensureAnimating() {
  if (!animating) {
    animating = true;
    requestAnimationFrame(animationLoop);
  }
}

function burst(cx, cy, count, sizeRange, speedRange) {
  // Cap particles: if at limit, trim oldest to make room
  const room = MAX_PARTICLES - particleCount;
  if (count > room) count = Math.max(0, room);

  const frag = document.createDocumentFragment();
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i / count) + (Math.random() - 0.5) * 0.4;
    const speed = speedRange[0] + Math.random() * (speedRange[1] - speedRange[0]);
    const size = sizeRange[0] + Math.random() * (sizeRange[1] - sizeRange[0]);
    const spin = (Math.random() - 0.5) * 8;
    const life = 80 + Math.random() * 100;

    const img = preloadedImg.cloneNode();
    img.className = 'spawned';
    img.style.width = size + 'px';
    frag.appendChild(img);

    particles_arr[particleCount++] = {
      img, x: cx, y: cy,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      spin, life, frame: 0
    };
  }
  particles.appendChild(frag);
  ensureAnimating();
}

function shake(intensity, duration) {
  shakeIntensity = intensity;
  shakeEnd = Date.now() + duration;
  ensureAnimating();
}

// Cache hero center — only changes on resize or growth
let heroCx, heroCy;
function updateHeroCenter() {
  const rect = hero.getBoundingClientRect();
  heroCx = rect.left + rect.width / 2;
  heroCy = rect.top + rect.height / 2;
}
updateHeroCenter();
window.addEventListener('resize', updateHeroCenter);

hero.addEventListener('click', () => {
  clicks++;

  const tier = Math.min(clicks, 10);
  const count = 6 + tier * 4;
  const maxSize = 24 + tier * 10;
  const speed = 4 + tier * 1.5;

  burst(heroCx, heroCy, count, [16, maxSize], [2, speed]);

  if (clicks >= 3) {
    shake(tier * 1.5, 200 + tier * 30);
  }

  if (clicks === 69) {
    const nice = document.getElementById('nice');
    nice.animate([
      { opacity: 0, transform: 'translate(-50%, -50%) scale(0.3)' },
      { opacity: 1, transform: 'translate(-50%, -50%) scale(1.1)', offset: 0.15 },
      { opacity: 1, transform: 'translate(-50%, -50%) scale(1)', offset: 0.3 },
      { opacity: 1, transform: 'translate(-50%, -50%) scale(1)', offset: 0.7 },
      { opacity: 0, transform: 'translate(-50%, -50%) scale(1.5)' }
    ], { duration: 1200, easing: 'ease-out' });
  }

  const growth = 1 + Math.floor(clicks / 100) * 0.15;
  hero.style.width = (96 * growth) + 'px';
  if (clicks % 100 === 0) updateHeroCenter();

  document.title = titles[Math.min(tier, titles.length) - 1];
  counter.textContent = clicks === 1 ? '1 dongus' : clicks + ' donguses';
  counter.style.color = `hsl(${clicks * 37 % 360}, 70%, 50%)`;
});
</script>
</body>
</html>
