<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DONGUS Airlines</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
    cursor: default;
  }
  #shaker {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
  }
  #hero {
    width: 96px;
    cursor: pointer;
    transition: transform 0.1s;
    user-select: none;
    -webkit-user-select: none;
  }
  #hero:hover {
    transform: scale(1.1);
  }
  #hero:active {
    transform: scale(0.95);
  }
  .spawned {
    position: absolute;
    image-rendering: pixelated;
  }
  #nice {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-family: Impact, sans-serif;
    font-size: 20vw;
    color: #fff;
    pointer-events: none;
    z-index: 999;
    text-shadow: 0 0 40px #ff0, 0 0 80px #f0f;
    opacity: 0;
  }
  #clickCount {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-family: monospace;
    color: #333;
    font-size: 14px;
    user-select: none;
    transition: color 0.3s;
    z-index: 20;
  }
</style>
</head>
<body>
<div id="shaker">
  <img id="hero" src="EGGPLANE_WHITE.png" alt="Eggplane">
</div>
<div id="particles"></div>
<div id="nice">NICE!</div>
<div id="clickCount"></div>
<script>
const hero = document.getElementById('hero');
const particles = document.getElementById('particles');
const shaker = document.getElementById('shaker');
const counter = document.getElementById('clickCount');
let clicks = 0;

const titles = [
  'dongus','DONGUS','D O N G U S','dongus rising','dongus ascending',
  'peak dongus','dongus singularity','dongus transcendence','MAXIMUM DONGUS',
  'dongus beyond comprehension'
];

function spawn(x, y, size, angle, speed, spin, life) {
  const img = document.createElement('img');
  img.src = 'EGGPLANE_WHITE.png';
  img.className = 'spawned';
  img.style.width = size + 'px';
  img.style.left = x + 'px';
  img.style.top = y + 'px';
  img.style.opacity = 1;
  particles.appendChild(img);

  const vx = Math.cos(angle) * speed;
  const vy = Math.sin(angle) * speed;
  let frame = 0;

  function tick() {
    frame++;
    const progress = frame / life;
    const px = x + vx * frame;
    const py = y + vy * frame + 0.03 * frame * frame;
    const rot = spin * frame;
    const opacity = progress < 0.6 ? 1 : Math.max(0, 1 - (progress - 0.6) / 0.4);
    img.style.left = px + 'px';
    img.style.top = py + 'px';
    img.style.transform = `rotate(${rot}deg)`;
    img.style.opacity = opacity;
    if (frame < life) {
      requestAnimationFrame(tick);
    } else {
      img.remove();
    }
  }
  requestAnimationFrame(tick);
}

function burst(cx, cy, count, sizeRange, speedRange) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i / count) + (Math.random() - 0.5) * 0.4;
    const speed = speedRange[0] + Math.random() * (speedRange[1] - speedRange[0]);
    const size = sizeRange[0] + Math.random() * (sizeRange[1] - sizeRange[0]);
    const spin = (Math.random() - 0.5) * 8;
    const life = 80 + Math.random() * 100;
    spawn(cx, cy, size, angle, speed, spin, life);
  }
}

function shake(intensity, duration) {
  const start = Date.now();
  function tick() {
    const elapsed = Date.now() - start;
    if (elapsed > duration) {
      shaker.style.transform = '';
      return;
    }
    const x = (Math.random() - 0.5) * intensity;
    const y = (Math.random() - 0.5) * intensity;
    shaker.style.transform = `translate(${x}px, ${y}px)`;
    requestAnimationFrame(tick);
  }
  tick();
}

hero.addEventListener('click', () => {
  clicks++;
  const rect = hero.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  const tier = Math.min(clicks, 10);
  const count = 6 + tier * 4;
  const maxSize = 24 + tier * 10;
  const speed = 4 + tier * 1.5;

  burst(cx, cy, count, [16, maxSize], [2, speed]);

  if (clicks >= 3) {
    shake(tier * 1.5, 200 + tier * 30);
  }

  if (clicks === 69) {
    const nice = document.getElementById('nice');
    nice.animate([
      { opacity: 0, transform: 'translate(-50%, -50%) scale(0.3)' },
      { opacity: 1, transform: 'translate(-50%, -50%) scale(1.1)', offset: 0.15 },
      { opacity: 1, transform: 'translate(-50%, -50%) scale(1)', offset: 0.3 },
      { opacity: 1, transform: 'translate(-50%, -50%) scale(1)', offset: 0.7 },
      { opacity: 0, transform: 'translate(-50%, -50%) scale(1.5)' }
    ], { duration: 1200, easing: 'ease-out' });
  }

  const growth = 1 + Math.floor(clicks / 100) * 0.15;
  hero.style.width = (96 * growth) + 'px';

  document.title = titles[Math.min(tier, titles.length) - 1];
  counter.textContent = clicks === 1 ? '1 dongus' : clicks + ' donguses';
  counter.style.color = `hsl(${clicks * 37 % 360}, 70%, 50%)`;
});
</script>
</body>
</html>
